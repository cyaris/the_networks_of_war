name: Rollup upload

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      production:
        description: Upload bundle.* files instead of staged test_bundle.* files.
        required: true
        type: boolean
        default: false
      dry-run:
        description: Print the S3 operations without writing objects.
        required: true
        type: boolean
        default: false
      svelte-lib-ref:
        description: svelte-lib ref used for the local file dependency.
        required: true
        type: string
        default: cy_dev3

jobs:
  resolve-inputs:
    runs-on: ubuntu-latest
    outputs:
      aws_role_to_assume: ${{ steps.values.outputs.aws_role_to_assume }}
      dry_run: ${{ steps.values.outputs.dry_run }}
      production: ${{ steps.values.outputs.production }}
      svelte_lib_ref: ${{ steps.values.outputs.svelte_lib_ref }}
    steps:
      - id: values
        env:
          INPUT_DRY_RUN: ${{ inputs.dry-run }}
          INPUT_PRODUCTION: ${{ inputs.production }}
          INPUT_SVELTE_LIB_REF: ${{ inputs.svelte-lib-ref }}
          VAR_AWS_ROLLUP_UPLOAD_ROLE_ARN: ${{ vars.AWS_ROLLUP_UPLOAD_ROLE_ARN }}
          VAR_SVELTE_LIB_REF: ${{ vars.SVELTE_LIB_REF }}
        run: |
          set -euo pipefail

          production="$INPUT_PRODUCTION"
          dry_run="$INPUT_DRY_RUN"
          svelte_lib_ref="${INPUT_SVELTE_LIB_REF:-${VAR_SVELTE_LIB_REF:-cy_dev3}}"

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            production="true"
            dry_run="false"
          fi

          {
            printf "aws_role_to_assume=%s\n" "$VAR_AWS_ROLLUP_UPLOAD_ROLE_ARN"
            printf "dry_run=%s\n" "$dry_run"
            printf "production=%s\n" "$production"
            printf "svelte_lib_ref=%s\n" "$svelte_lib_ref"
          } >> "$GITHUB_OUTPUT"

  rollup-upload:
    needs: resolve-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          path: ${{ github.event.repository.name }}

      - name: Checkout svelte-lib
        uses: actions/checkout@v6
        with:
          repository: cyaris/svelte-lib
          ref: ${{ needs.resolve-inputs.outputs.svelte_lib_ref }}
          path: svelte-lib
          token: ${{ secrets.CHECKOUT_TOKEN || github.token }}

      - name: Rollup and upload embedded bundle
        uses: ./svelte-lib/.github/actions/rollup-upload
        with:
          caller-repository-name: ${{ github.event.repository.name }}
          working-directory: frontend
          dist-directory: frontend/dist
          bundle-files: |
            bundle.css:text/css
            bundle.js:application/javascript
          s3-bucket: cyaris.github.io
          s3-prefix: the_networks_of_war
          aws-region: us-east-2
          aws-role-to-assume: ${{ needs.resolve-inputs.outputs.aws_role_to_assume }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          production: ${{ needs.resolve-inputs.outputs.production }}
          dry-run: ${{ needs.resolve-inputs.outputs.dry_run }}
          checkout-token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
